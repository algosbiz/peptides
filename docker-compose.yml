# Local Postgres for the datum admin/catalogue.
# The Next.js app runs on the host (`npm run dev`) and connects to this on :5432.
#   docker compose up -d        # start Postgres
#   docker compose down         # stop (data persists in the named volume)
#   docker compose down -v      # stop and wipe the database

services:
  postgres:
    image: postgres:17-alpine
    container_name: datum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: datum
      POSTGRES_PASSWORD: datum
      POSTGRES_DB: datum
    ports:
      - "5432:5432"
    volumes:
      - datum-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datum -d datum"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  datum-pgdata:
